# ExternalSecret — syncs Falcon API credentials from AWS Secrets Manager
#
# This replaces the manually-created Kubernetes secret from the scripted
# and kubectl models. The ExternalSecret manifest is safe to commit to
# git — it contains only the reference to the secret, not the value.
#
# Prerequisites:
#   1. External Secrets Operator (ESO) installed on the cluster:
#        helm repo add external-secrets https://charts.external-secrets.io
#        helm install external-secrets external-secrets/external-secrets \
#          -n external-secrets --create-namespace
#
#   2. An AWS Secrets Manager secret containing the Falcon credentials.
#      Create it with the AWS CLI:
#        aws secretsmanager create-secret \
#          --name "/falcon/eks/<cluster-name>/credentials" \
#          --region <region> \
#          --secret-string '{
#            "falcon-client-id": "<your-client-id>",
#            "falcon-client-secret": "<your-client-secret>",
#            "falcon-cid": "<your-cid-with-checksum>"
#          }'
#
#   3. An IAM role for the ESO service account (IRSA) with permission to
#      read the secret:
#        aws iam create-policy --policy-name FalconESO \
#          --policy-document '{
#            "Version": "2012-10-17",
#            "Statement": [{
#              "Effect": "Allow",
#              "Action": ["secretsmanager:GetSecretValue", "secretsmanager:DescribeSecret"],
#              "Resource": "arn:aws:secretsmanager:<region>:<account-id>:secret:/falcon/*"
#            }]
#          }'
#
#        eksctl create iamserviceaccount \
#          --name external-secrets \
#          --namespace external-secrets \
#          --cluster <cluster-name> \
#          --region <region> \
#          --attach-policy-arn arn:aws:iam::<account-id>:policy/FalconESO \
#          --approve
#
---
# SecretStore — tells ESO how to connect to AWS Secrets Manager
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: falcon-operator
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1    # replace with your AWS region
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets   # ESO service account with IRSA role
            namespace: external-secrets
---
# ExternalSecret — creates the falcon-secrets Kubernetes secret
# by pulling values from the AWS Secrets Manager secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: falcon-secrets
  namespace: falcon-operator
spec:
  refreshInterval: 1h    # how often ESO re-syncs from Secrets Manager

  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore

  target:
    name: falcon-secrets         # name of the Kubernetes secret to create
    creationPolicy: Owner        # ESO owns the secret lifecycle
    deletionPolicy: Retain       # keep the secret if this ExternalSecret is deleted

  data:
    - secretKey: falcon-client-id
      remoteRef:
        key: /falcon/eks/my-cluster/credentials   # replace with your secret name
        property: falcon-client-id

    - secretKey: falcon-client-secret
      remoteRef:
        key: /falcon/eks/my-cluster/credentials
        property: falcon-client-secret

    - secretKey: falcon-cid
      remoteRef:
        key: /falcon/eks/my-cluster/credentials
        property: falcon-cid
