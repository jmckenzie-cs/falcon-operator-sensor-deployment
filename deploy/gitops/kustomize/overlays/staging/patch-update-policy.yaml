# Patches updatePolicy and clusterName for the staging environment.
# clusterName must be the full EKS ARN to prevent duplicate entries in the
# Falcon Kubernetes & Containers dashboard.
# Format: arn:aws:eks:<region>:<account-id>:cluster/<cluster-name>
apiVersion: falcon.crowdstrike.com/v1alpha1
kind: FalconDeployment
metadata:
  name: falcon-deployment
spec:
  falconNodeSensor:
    node:
      advanced:
        updatePolicy: "k8s-staging"
  falconAdmission:
    clusterName: "arn:aws:eks:<region>:<account-id>:cluster/<staging-cluster-name>"
  falconImageAnalyzer:
    imageAnalyzerConfig:
      clusterName: "arn:aws:eks:<region>:<account-id>:cluster/<staging-cluster-name>"
