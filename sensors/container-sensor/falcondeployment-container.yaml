# FalconDeployment — Container Sensor (Sidecar Injection) for EKS Fargate
#
# Use this manifest INSTEAD OF sensors/node-sensor/falcondeployment.yaml when
# running workloads on AWS Fargate, where kernel access and privileged containers
# are not permitted.
#
# FalconNodeSensor (kernel DaemonSet) is NOT compatible with Fargate nodes.
# Use this sidecar injection model for Fargate pods.
#
# The container sensor runs as an unprivileged sidecar injected into each
# pod via a MutatingWebhookConfiguration. The operator must be running on
# EC2 nodes (not Fargate) to manage the webhook.
#
# DO NOT deploy FalconNodeSensor and FalconContainer on the same cluster —
# pick one deployment model per cluster.
#
apiVersion: falcon.crowdstrike.com/v1alpha1
kind: FalconDeployment
metadata:
  name: falcon-deployment
  labels:
    crowdstrike.com/component: sensor
    crowdstrike.com/created-by: falcon-operator
    crowdstrike.com/managed-by: kustomize
    crowdstrike.com/name: falcon-deployment
    crowdstrike.com/part-of: Falcon
    crowdstrike.com/provider: crowdstrike
spec:
  falconSecret:
    enabled: true
    namespace: falcon-operator
    secretName: falcon-secrets

  falcon_api:
    cloud_region: autodiscover

  deployNodeSensor: false         # Disabled — use container sensor instead
  deployContainerSensor: true     # Falcon Container (sidecar injection)
  deployAdmissionController: true
  deployImageAnalyzer: true

  falcon: {}

  # -----------------------------------------------------------------------
  # FalconContainer overrides
  # -----------------------------------------------------------------------
  falconContainerSensor:
    # Advanced auto-update via Sensor Update Policy (same mechanism as NodeSensor).
    # Spec location for container sensor: spec.advanced (not spec.node.advanced)
    advanced:
      autoUpdate: normal
      updatePolicy: "k8s-prod"

    injector:
      # Disable default injection globally and opt-in per namespace/pod
      # disableDefaultNamespaceInjection: false
      # disableDefaultPodInjection: false
      replicas: 2

  falconAdmission:
    admissionConfig:
      admissionControlEnabled: true

  falconImageAnalyzer:
    imageAnalyzerConfig: {}
