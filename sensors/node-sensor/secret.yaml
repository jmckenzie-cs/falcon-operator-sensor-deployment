# Secret Template — DO NOT commit a populated version of this file.
# Populate and apply this manually, or use your secrets management solution
# (Vault, AWS Secrets Manager, Sealed Secrets, External Secrets Operator, etc.)
#
# Usage:
#   kubectl create secret generic falcon-secrets \
#     -n falcon-operator \
#     --from-literal=falcon-client-id="$FALCON_CLIENT_ID" \
#     --from-literal=falcon-client-secret="$FALCON_CLIENT_SECRET" \
#     --from-literal=falcon-cid="$FALCON_CID"
#
# Required API scopes for the API client:
#   - Falcon Images Download: Read
#   - Sensor Download: Read
#   - Sensor Update Policies: Read   <-- Required for autoUpdate + updatePolicy
#
apiVersion: v1
kind: Secret
metadata:
  name: falcon-secrets
  namespace: falcon-operator
type: Opaque
stringData:
  falcon-client-id: "REPLACE_WITH_CLIENT_ID"
  falcon-client-secret: "REPLACE_WITH_CLIENT_SECRET"
  falcon-cid: "REPLACE_WITH_CID_WITH_CHECKSUM"
  # falcon-provisioning-token: "OPTIONAL_PROVISIONING_TOKEN"
